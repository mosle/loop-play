name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in tauri.conf.json
        run: |
          sed -i '' 's/"version": ".*"/"version": "'${{ steps.version.outputs.VERSION }}'"/' src-tauri/tauri.conf.json
          cat src-tauri/tauri.conf.json | grep version

      - name: Update version in package.json
        run: |
          sed -i '' 's/"version": ".*"/"version": "'${{ steps.version.outputs.VERSION }}'"/' package.json

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build --target universal-apple-darwin

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)

          # Create tar.gz of .app
          APP_DIR="$BUNDLE_DIR/macos"
          tar czf "$APP_DIR/loop-play_universal.app.tar.gz" -C "$APP_DIR" "loop-play.app"

          gh release create "${{ github.ref_name }}" \
            --title "Loop Play ${{ github.ref_name }}" \
            --draft \
            "$DMG" \
            "$APP_DIR/loop-play_universal.app.tar.gz"

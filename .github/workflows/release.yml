name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update version in tauri.conf.json
        run: |
          sed -i '' 's/"version": ".*"/"version": "'${{ steps.version.outputs.VERSION }}'"/' src-tauri/tauri.conf.json
          cat src-tauri/tauri.conf.json | grep version

      - name: Update version in package.json
        run: |
          sed -i '' 's/"version": ".*"/"version": "'${{ steps.version.outputs.VERSION }}'"/' package.json

      - name: Install Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - run: pnpm install

      - name: Build Tauri app (signed + updater)
        env:
          APPLE_SIGNING_IDENTITY: "Developer ID Application: YOUSUKE YASUDA (ZEV53593SB)"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          APP_PATH="$BUNDLE_DIR/macos/loop-play.app"

          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/loop-play.zip"

          xcrun notarytool submit "$RUNNER_TEMP/loop-play.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"

          # Re-create DMG with stapled app
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then rm "$DMG"; fi

          DMG_NAME="loop-play_${{ steps.version.outputs.VERSION }}_universal.dmg"
          hdiutil create -volname "Loop Play" -srcfolder "$APP_PATH" -ov -format UDZO "$BUNDLE_DIR/dmg/$DMG_NAME"

          xcrun notarytool submit "$BUNDLE_DIR/dmg/$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$BUNDLE_DIR/dmg/$DMG_NAME"

      - name: Generate updater JSON
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"

          # Find the .tar.gz updater artifact and its .sig
          TAR_GZ=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" | head -1)
          SIG=$(cat "${TAR_GZ}.sig")
          URL="https://github.com/mosle/loop-play/releases/download/${{ github.ref_name }}/loop-play_universal.app.tar.gz"

          cat > "$BUNDLE_DIR/latest.json" << EOF
          {
            "version": "${VERSION}",
            "notes": "Loop Play ${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-universal": {
                "signature": "${SIG}",
                "url": "${URL}"
              },
              "darwin-aarch64": {
                "signature": "${SIG}",
                "url": "${URL}"
              },
              "darwin-x86_64": {
                "signature": "${SIG}",
                "url": "${URL}"
              }
            }
          }
          EOF

          cat "$BUNDLE_DIR/latest.json"

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)

          # Find the updater tar.gz
          TAR_GZ=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" | head -1)

          gh release create "${{ github.ref_name }}" \
            --title "Loop Play ${{ github.ref_name }}" \
            --draft \
            "$DMG" \
            "$TAR_GZ" \
            "$BUNDLE_DIR/latest.json"
